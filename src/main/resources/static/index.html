<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda — Productos</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0d0d0d;
            --surface: #141414;
            --card: #1a1a1a;
            --card-hover: #202020;
            --border: rgba(255,255,255,0.07);
            --accent: #c8a96e;
            --accent-soft: rgba(200,169,110,0.12);
            --text: #f0ece4;
            --muted: #7a7060;
            --green: #4caf6e;
            --red: #e05555;
            --radius: 16px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Noise Texture Overlay ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.6;
        }

        /* ── Header ── */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(13,13,13,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 clamp(20px, 5vw, 80px);
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 900;
            letter-spacing: -0.02em;
            color: var(--text);
        }
        .logo span { color: var(--accent); }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .cart-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--accent-soft);
            border: 1px solid rgba(200,169,110,0.3);
            color: var(--accent);
            padding: 8px 18px;
            border-radius: 50px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.03em;
        }
        .cart-btn:hover {
            background: rgba(200,169,110,0.2);
            transform: translateY(-1px);
        }

        /* ── Main Layout ── */
        main {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: clamp(30px, 5vw, 60px) clamp(20px, 5vw, 80px);
        }

        /* ── Hero Section ── */
        .hero {
            margin-bottom: 56px;
            animation: fadeUp 0.7s ease both;
        }

        .hero-tag {
            display: inline-block;
            background: var(--accent-soft);
            border: 1px solid rgba(200,169,110,0.25);
            color: var(--accent);
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 5px 14px;
            border-radius: 50px;
            margin-bottom: 20px;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.4rem, 5vw, 4rem);
            font-weight: 900;
            line-height: 1.05;
            letter-spacing: -0.03em;
            color: var(--text);
            max-width: 600px;
        }

        .hero h1 em {
            font-style: italic;
            color: var(--accent);
        }

        .hero-sub {
            margin-top: 14px;
            color: var(--muted);
            font-size: 0.95rem;
            font-weight: 300;
            max-width: 400px;
            line-height: 1.7;
        }

        /* ── Filters Bar ── */
        .filters-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 36px;
            flex-wrap: wrap;
            animation: fadeUp 0.7s 0.1s ease both;
        }

        .filter-chip {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 7px 18px;
            border-radius: 50px;
            font-size: 0.82rem;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-chip:hover, .filter-chip.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #0d0d0d;
            font-weight: 500;
        }

        .results-count {
            margin-left: auto;
            color: var(--muted);
            font-size: 0.82rem;
        }

        /* ── Product Grid ── */
        #productos-list {
            list-style: none;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            animation: fadeUp 0.7s 0.15s ease both;
        }

        /* ── Product Card ── */
        .producto-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            animation: cardIn 0.5s ease both;
        }

        .producto-card:hover {
            transform: translateY(-6px);
            border-color: rgba(200,169,110,0.3);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(200,169,110,0.1);
        }

        /* ── Card Image ── */
        .card-image-wrap {
            position: relative;
            aspect-ratio: 4/3;
            overflow: hidden;
            background: #111;
        }

        .card-image-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
            display: block;
        }

        .producto-card:hover .card-image-wrap img {
            transform: scale(1.06);
        }

        .badge-discount {
            position: absolute;
            top: 12px;
            left: 12px;
            background: var(--red);
            color: #fff;
            font-size: 0.72rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 50px;
            letter-spacing: 0.04em;
        }

        .badge-stock-low {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(13,13,13,0.75);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--muted);
            font-size: 0.68rem;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 50px;
        }

        .btn-wish {
            position: absolute;
            bottom: 12px;
            right: 12px;
            width: 34px;
            height: 34px;
            background: rgba(13,13,13,0.7);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.2s;
            cursor: pointer;
            color: var(--muted);
            font-size: 1rem;
        }
        .producto-card:hover .btn-wish {
            opacity: 1;
            transform: scale(1);
        }

        /* ── Card Body ── */
        .card-body {
            padding: 18px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
        }

        .card-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2px;
        }

        .card-category {
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--accent);
        }

        .card-brand {
            font-size: 0.7rem;
            color: var(--muted);
        }

        .card-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1.3;
            letter-spacing: -0.01em;
        }

        .card-desc {
            font-size: 0.82rem;
            color: var(--muted);
            line-height: 1.6;
            font-weight: 300;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 12px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
        }

        .price-block {}
        .price-original {
            font-size: 0.75rem;
            color: var(--muted);
            text-decoration: line-through;
        }
        .price-main {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.02em;
        }
        .price-main.discounted { color: var(--green); }

        .stock-pill {
            font-size: 0.7rem;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 50px;
        }
        .stock-ok {
            background: rgba(76,175,110,0.12);
            color: var(--green);
            border: 1px solid rgba(76,175,110,0.2);
        }
        .stock-low {
            background: rgba(224,85,85,0.12);
            color: var(--red);
            border: 1px solid rgba(224,85,85,0.2);
        }

        .btn-add {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #0d0d0d;
            font-size: 1.2rem;
            font-weight: 700;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .btn-add:hover {
            background: #d4b87a;
            transform: scale(1.1);
        }

        /* ── Loading ── */
        #loading-message {
            text-align: center;
            padding: 80px 20px;
            color: var(--muted);
            font-size: 0.9rem;
            letter-spacing: 0.05em;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        /* ── Error ── */
        .error-message {
            background: rgba(224,85,85,0.08);
            border: 1px solid rgba(224,85,85,0.2);
            color: #e08080;
            border-radius: var(--radius);
            padding: 20px 24px;
            font-size: 0.9rem;
            display: none; /* Aseguramos que esté oculto por defecto */
        }

        /* ── Empty State ── */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--muted);
        }

        /* ── Animations ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Staggered card animation */
        .producto-card:nth-child(1)  { animation-delay: 0.05s; }
        .producto-card:nth-child(2)  { animation-delay: 0.10s; }
        .producto-card:nth-child(3)  { animation-delay: 0.15s; }
        .producto-card:nth-child(4)  { animation-delay: 0.20s; }
        .producto-card:nth-child(5)  { animation-delay: 0.25s; }
        .producto-card:nth-child(6)  { animation-delay: 0.30s; }
        .producto-card:nth-child(7)  { animation-delay: 0.35s; }
        .producto-card:nth-child(8)  { animation-delay: 0.40s; }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            #productos-list {
                grid-template-columns: 1fr 1fr;
                gap: 14px;
            }
            .hero h1 { font-size: 2rem; }
        }
        @media (max-width: 400px) {
            #productos-list { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">STOR<span>É</span></div>
    <div class="header-actions">
        <button class="cart-btn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            Carrito <span id="cart-count" style="background:#c8a96e;color:#0d0d0d;border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;">0</span>
        </button>
    </div>
</header>

<main>
    <section class="hero">
        <div class="hero-tag">✦ Colección actual</div>
        <h1>Encuentra lo que <em>buscas,</em> y más.</h1>
        <p class="hero-sub">Selección curada de productos con la mejor calidad y precios directos.</p>
    </section>

    <div class="filters-bar">
        <button class="filter-chip active">Todos</button>
        <button class="filter-chip">En oferta</button>
        <button class="filter-chip">Disponibles</button>
        <span class="results-count" id="results-count"></span>
    </div>

    <div id="loading-message">
        <div class="spinner"></div>
        Cargando productos...
    </div>
    <div id="error-message" class="error-message"></div>
    <ul id="productos-list"></ul>
</main>

<script>
    let cartCount = 0;
    const cartCountEl = document.getElementById('cart-count');

    function addToCart() {
        cartCount++;
        cartCountEl.textContent = cartCount;
        cartCountEl.style.transform = 'scale(1.3)';
        setTimeout(() => cartCountEl.style.transform = 'scale(1)', 200);
    }

    // Filter chips
    document.querySelectorAll('.filter-chip').forEach(chip => {
        chip.addEventListener('click', () => {
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
        });
    });

    document.addEventListener('DOMContentLoaded', () => {
        const productosList = document.getElementById('productos-list');
        const loadingMessage = document.getElementById('loading-message');
        const errorMessage = document.getElementById('error-message'); // Mantener la referencia por si acaso

        fetch('/api/productos')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(productos => {
                loadingMessage.style.display = 'none';
                const resultsCount = document.getElementById('results-count');
                resultsCount.textContent = `${productos.length} producto${productos.length !== 1 ? 's' : ''}`;

                if (productos.length === 0) {
                    productosList.innerHTML = '<div class="empty-state"><p>No hay productos disponibles.</p></div>';
                    return;
                }

                productos.forEach(producto => {
                    const li = document.createElement('li');
                    li.className = 'producto-card';

                    const imgSrc = producto.imagenPortadaUrl || 'https://via.placeholder.com/400x300/1a1a1a/333?text=';
                    const precioOriginal = producto.descuento > 0
                        ? `<div class="price-original">$${producto.precio.toFixed(2)}</div>`
                        : '';
                    const precioFinal = producto.descuento > 0
                        ? (producto.precio * (1 - producto.descuento / 100))
                        : producto.precio;
                    const stockLabel = producto.stock <= 5
                        ? `<span class="stock-pill stock-low">Últimas ${producto.stock}</span>`
                        : `<span class="stock-pill stock-ok">${producto.stock} en stock</span>`;

                    li.innerHTML = `
                            <div class="card-image-wrap">
                                <img src="${imgSrc}" alt="${producto.nombre}"
                                     onerror="this.onerror=null;this.src='https://via.placeholder.com/400x300/1a1a1a/555555?text=Sin+imagen';" />
                                ${producto.descuento > 0 ? `<div class="badge-discount">−${producto.descuento}%</div>` : ''}
                                <button class="btn-wish" title="Guardar">♡</button>
                            </div>
                            <div class="card-body">
                                <div class="card-meta">
                                    <span class="card-category">${producto.categoriaNombre || 'General'}</span>
                                    <span class="card-brand">${producto.marcaNombre || ''}</span>
                                </div>
                                <div class="card-name">${producto.nombre}</div>
                                <div class="card-desc">${producto.descripcion || ''}</div>
                                <div class="card-footer">
                                    <div class="price-block">
                                        ${precioOriginal}
                                        <div class="price-main ${producto.descuento > 0 ? 'discounted' : ''}">$${precioFinal.toFixed(2)}</div>
                                    </div>
                                    <div style="display:flex;align-items:center;gap:8px;">
                                        ${stockLabel}
                                        <button class="btn-add" onclick="addToCart()" title="Agregar al carrito">+</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    productosList.appendChild(li);
                });
            })
            .catch(error => {
                loadingMessage.style.display = 'none';
                // Eliminamos la visualización del mensaje de error en la página
                // errorMessage.style.display = 'block';
                // errorMessage.textContent = `No se pudo conectar al servidor: ${error.message}. Asegúrate de que el backend esté corriendo.`;
                console.error('Error fetching products:', error);
                productosList.innerHTML = '<div class="empty-state"><p>No se pudieron cargar los productos. Asegúrate de que el backend esté funcionando correctamente.</p></div>';
            });
    });
</script>
</body>
</html>
